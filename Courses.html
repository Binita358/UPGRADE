<!DOCTYPE html>
<html>
    <head>
        <title>Courses</title>
        <link rel="stylesheet" href="style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <header class="bg-dark text-white p-2"><h2>E-Learning Platform</h2></header>
        <nav class="navbar navbar-light bg-light">
            <div class="container">
                <a class="nav-link" href="Dashboard.html">Dashboard</a>
                <a class="nav-link" href="Courses.html">Courses</a>
                <a class="nav-link" href="Quiz.html">Quiz</a>
                <a class="nav-link" href="Profile.html">Profile</a>
            </div>
        </nav>
        <main class="container mt-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="Dashboard.html">Home</a></li>
                    <li class="breadcrumb-item active">Courses</li>
                </ol>
            </nav>
            <section>
                <h3>Course List</h3>
                <div id="courseContainer" class="course-container"></div>
            </section>
        </main>
        <script src="data.js"></script>
        <script>
            const container=document.getElementById("courseContainer")
            courses.forEach(course=>{
            container.innerHTML+=`
            <div class="course-card">
            <h4>${course.name}</h4>
            <ol>
            ${course.lessons.map(l=>`<li>${l}</li>`).join("")}
            </ol>
            <button onclick="completeCourse('${course.name}')">
            Complete Course
            </button>
            </div>
            `
            })
            function completeCourse(name){
            let completed=JSON.parse(localStorage.getItem("completed"))||[]
            if(!completed.includes(name)){
            completed.push(name)
            localStorage.setItem("completed",JSON.stringify(completed))
            alert("Course Completed")
            }
            }
        </script>
    </body>
</html>
